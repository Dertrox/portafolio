<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>José Restrepo | Portafolio</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
}

header {
  border-bottom: 1px solid #00ff88;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

nav button {
  background: transparent;
  border: 1px solid #00ff88;
  color: #00ff88;
  margin: 2px;
  padding: 6px 10px;
  cursor: pointer;
}

nav button:hover {
  background: #00ff88;
  color: black;
}

main {
  padding: 20px;
  animation: fade 0.4s ease;
}

.card {
  border: 1px solid #00ff88;
  padding: 15px;
  margin: 10px 0;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
  <div>jose@system:~$</div>
  <nav>
    <button onclick="load('home')">home</button>
    <button onclick="load('electronica')">electronica</button>
    <button onclick="load('fpga')">fpga</button>
    <button onclick="load('juegos')">juegos</button>
    <button onclick="load('contacto')">contacto</button>
  </nav>
</header>

<main id="app"></main>

<script>

const pages = {

home: `
<h1>> inicializando sistema...</h1>
<p>
Desarrollador enfocado en sistemas electrónicos, telemetría y desarrollo interactivo.
Integro hardware, software y visualización en tiempo real.
</p>

<div class="card">
<h2>Enfoque</h2>
<p>
Trabajo con microcontroladores, FPGA, comunicación inalámbrica y visualización de datos.
</p>
</div>

<div class="card">
<h2>Tecnologías</h2>
<p>
ATmega328p, ESP32, LoRa 915MHz, Python, Unity, FPGA
</p>
</div>
`,

electronica: `
<h1>> módulos electrónicos</h1>

<div class="card">
<h2>🚀 Cohete con telemetría</h2>
<p>
Sistema con ESP32 + sensores + transmisión LoRa para monitoreo en tiempo real.
</p>

<!-- AGREGAR FOTO DEL COHETE AQUÍ -->
<!-- <img src="cohete.jpg"> -->

<p>
Variables: presión, temperatura, altitud.
</p>
</div>

<div class="card">
<h2>📡 Comunicación inalámbrica</h2>
<p>
Implementación de enlaces LoRa en 915 MHz para transmisión de datos en largo alcance.
</p>

<!-- AGREGAR DIAGRAMA O FOTO -->
</div>

`,

fpga: `
<h1>> procesamiento en fpga</h1>

<div class="card">
<h2>⚡ Sistema FPGA + PC</h2>
<p>
Filtrado de señales en FPGA y visualización en interfaz Python.
</p>

<!-- AGREGAR CAPTURA DEL SOFTWARE -->
</div>

<div class="card">
<h2>🔬 Procesamiento digital</h2>
<p>
Implementación de lógica digital para análisis de señales.
</p>
</div>
`,

juegos: `
<h1>> entorno interactivo</h1>

<div class="card">
<h2>🎮 Desarrollo en Unity</h2>
<p>
Sistemas de juego, control de unidades y UI estilo estrategia.
</p>

<!-- AGREGAR VIDEO O IMAGEN DEL JUEGO -->
</div>

<div class="card">
<h2>🧠 Lógica de interacción</h2>
<p>
Diseño de mecánicas y comportamiento de entidades.
</p>
</div>
`,

contacto: `
<h1>> comunicación establecida</h1>

<div class="card">
<p>Email: jose.restrepowork@gmail.com</p>
</div>

<div class="card">
<p>GitHub: https://github.com/Dertrox</p>
</div>
`
};

function load(page){
  document.getElementById("app").innerHTML = pages[page];
}

load("home");

</script>

</body>
</html>
