<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portafolio | José Restrepo</title>
  <style>
    :root{
      --bg:#050805;
      --panel:#071007;
      --panel2:#0b150b;
      --line:rgba(0,255,120,.18);
      --text:#7CFFB0;
      --text2:#b7ffd2;
      --muted:#8fd9aa;
      --accent:#18ff88;
      --accent2:#00d46a;
      --shadow: 0 0 0 1px rgba(24,255,136,.12), 0 20px 60px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    html,body,#root{ height:100%; margin:0; }
    body{
      background:
        radial-gradient(circle at top, rgba(24,255,136,.12), transparent 35%),
        linear-gradient(180deg, #020402 0%, #050805 100%);
      color:var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      overflow-x:hidden;
    }

    .wrap{
      min-height:100%;
      position:relative;
    }

    .scanlines{
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.02) 50%, transparent 50%);
      background-size:100% 4px;
      opacity:.07;
      mix-blend-mode:screen;
    }

    .grid{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.18;
      background-image:
        radial-gradient(circle, rgba(24,255,136,.18) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 20%, transparent 90%);
    }

    .container{
      width:min(1120px, calc(100% - 32px));
      margin:0 auto;
      padding:24px 0 40px;
      position:relative;
      z-index:1;
    }

    .shell{
      background: linear-gradient(180deg, rgba(7,16,7,.92), rgba(4,8,4,.92));
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius:24px;
      overflow:hidden;
      backdrop-filter: blur(8px);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      background: linear-gradient(180deg, rgba(10,20,10,.9), rgba(7,16,7,.78));
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--text2);
      font-weight:700;
      letter-spacing:.2px;
      white-space:nowrap;
    }

    .brand .dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 18px rgba(24,255,136,.75);
      flex:0 0 auto;
    }

    .brand .prompt{
      color:var(--accent);
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .nav button{
      appearance:none;
      border:1px solid var(--line);
      background:rgba(8,20,8,.9);
      color:var(--text2);
      padding:10px 12px;
      border-radius:999px;
      font:inherit;
      cursor:pointer;
      transition: .2s ease;
    }

    .nav button:hover{
      transform: translateY(-1px);
      border-color: rgba(24,255,136,.35);
      box-shadow: 0 0 0 1px rgba(24,255,136,.08), 0 10px 24px rgba(0,0,0,.22);
    }

    .nav button.active{
      background: linear-gradient(180deg, rgba(24,255,136,.18), rgba(24,255,136,.08));
      color: var(--accent);
      border-color: rgba(24,255,136,.42);
    }

    .content{
      padding:28px 18px 18px;
    }

    .terminal{
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(8,16,8,.85), rgba(4,8,4,.9));
      border-radius:20px;
      padding:22px;
      min-height:420px;
      position:relative;
      overflow:hidden;
    }

    .terminal::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(24,255,136,.12), transparent 25%),
        radial-gradient(circle at 85% 35%, rgba(24,255,136,.08), transparent 22%);
      pointer-events:none;
    }

    .fadeIn{
      animation: fadeIn .28s ease-out;
      position:relative;
      z-index:1;
    }

    @keyframes fadeIn{
      from{ opacity:0; transform: translateY(10px); }
      to{ opacity:1; transform: translateY(0); }
    }

    h1{
      margin:0 0 8px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height:1.05;
      color:var(--accent);
      letter-spacing:-.5px;
    }

    .sub{
      margin:0 0 24px;
      color:var(--muted);
      max-width:760px;
      line-height:1.7;
      font-size: 1.02rem;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(24,255,136,.18);
      background: rgba(24,255,136,.06);
      color: var(--text2);
      padding:8px 12px;
      border-radius:999px;
      margin-bottom:14px;
      font-size:.92rem;
    }

    .status .pulse{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 12px rgba(24,255,136,.8);
    }

    .gridCards{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:14px;
      margin-top:18px;
    }

    .card{
      grid-column: span 6;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(11,21,11,.92), rgba(7,15,7,.92));
      border-radius:18px;
      padding:18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.18);
    }

    .card.wide{ grid-column: span 12; }

    .card h2{
      margin:0 0 8px;
      font-size:1.08rem;
      color:var(--text2);
    }

    .card p{
      margin:0;
      line-height:1.65;
      color:var(--muted);
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:12px;
    }

    .tag{
      border:1px solid rgba(24,255,136,.14);
      background: rgba(24,255,136,.05);
      color:var(--text2);
      border-radius:999px;
      padding:6px 10px;
      font-size:.82rem;
    }

    .contact{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:14px;
    }

    .contact a{
      color:var(--accent);
      text-decoration:none;
      word-break:break-word;
    }

    .linkbox{
      border:1px solid var(--line);
      background: rgba(24,255,136,.05);
      border-radius:16px;
      padding:14px;
    }

    .footer{
      padding:0 18px 18px;
      color:rgba(183,255,210,.7);
      font-size:.9rem;
    }

    @media (max-width: 820px){
      .card{ grid-column: span 12; }
      .contact{ grid-template-columns:1fr; }
      .topbar{ align-items:flex-start; }
      .nav{ justify-content:flex-start; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [active, setActive] = useState("home");

      const sections = {
        home: {
          title: "Sistema inicializado.",
          subtitle:
            "Desarrollo proyectos que conectan electrónica, software y visualización. Trabajo con microcontroladores, comunicación inalámbrica, FPGA, prototipos interactivos y experiencias en tiempo real.",
          cards: [
            {
              title: "Perfil técnico",
              text:
                "Enfoque en integración de hardware y software: adquisición de datos, telemetría, comunicación y prototipado funcional.",
            },
            {
              title: "Línea de trabajo",
              text:
                "Proyectos experimentales y portafolio técnico con documentación clara, resultados medibles y demostraciones visuales.",
            },
          ],
          tags: ["Electrónica", "Telemetría", "FPGA", "Unity", "Python", "LoRa"],
        },
        electronica: {
          title: "Módulos de electrónica.",
          subtitle:
            "Aquí concentro proyectos de instrumentación, adquisición de señales, radiofrecuencia y sistemas embebidos.",
          cards: [
            {
              title: "Cohete experimental",
              text:
                "Sistema de telemetría con sensores, GPS y enlace inalámbrico para monitoreo de variables durante pruebas.",
            },
            {
              title: "Comunicación y control",
              text:
                "Diseños con microcontroladores, buses de comunicación y lógica de supervisión para sistemas físicos.",
            },
            {
              title: "Procesamiento de señales",
              text:
                "Filtrado, visualización y análisis de señales con flujo hacia interfaz de PC o sistema embebido.",
            },
          ],
          tags: ["ATmega328p", "ESP32", "LoRa", "GPS", "Sensores", "RF"],
        },
        juegos: {
          title: "Entorno interactivo.",
          subtitle:
            "Desarrollo mecánicas, interfaces y prototipos jugables con foco en claridad, respuesta y control.",
          cards: [
            {
              title: "Unity",
              text:
                "Interfaces, control de unidades, sistemas de juego y prototipos interactivos para validación de ideas.",
            },
            {
              title: "UI estratégica",
              text:
                "Diseño de paneles y flujo de interacción tipo estrategia / gestión, priorizando legibilidad y escalabilidad.",
            },
          ],
          tags: ["Unity", "UI", "Gameplay", "Prototipos", "Interacción"],
        },
        vr: {
          title: "Exploración inmersiva.",
          subtitle:
            "Pruebas y plantillas para interacción espacial, visualización envolvente y experiencias inmersivas.",
          cards: [
            {
              title: "Prototipos VR",
              text:
                "Experimentos de navegación, selección e interacción en entornos tridimensionales.",
            },
            {
              title: "Visualización",
              text:
                "Interfaces orientadas a inmersión para exploración técnica o demostraciones de concepto.",
            },
          ],
          tags: ["VR", "3D", "Inmersión", "Interacción"],
        },
        contacto: {
          title: "Canal abierto.",
          subtitle:
            "Contacto directo para colaboración, revisión técnica o seguimiento de proyectos.",
          cards: [
            {
              title: "Correo",
              text: "jose.restrepowork@gmail.com",
              link: "mailto:jose.restrepowork@gmail.com",
            },
            {
              title: "GitHub",
              text: "github.com/Dertrox",
              link: "https://github.com/Dertrox",
            },
          ],
          tags: ["Disponible para colaboración", "Portafolio público"],
        },
      };

      const section = sections[active];

      return (
        <div className="wrap">
          <div className="scanlines"></div>
          <div className="grid"></div>

          <div className="container">
            <div className="shell">
              <header className="topbar">
                <div className="brand">
                  <span className="dot"></span>
                  <span className="prompt">jose@system:~$</span>
                  <span>portafolio</span>
                </div>

                <nav className="nav" aria-label="Secciones del portafolio">
                  <button className={active === "home" ? "active" : ""} onClick={() => setActive("home")}>home</button>
                  <button className={active === "electronica" ? "active" : ""} onClick={() => setActive("electronica")}>electrónica</button>
                  <button className={active === "juegos" ? "active" : ""} onClick={() => setActive("juegos")}>juegos</button>
                  <button className={active === "vr" ? "active" : ""} onClick={() => setActive("vr")}>vr</button>
                  <button className={active === "contacto" ? "active" : ""} onClick={() => setActive("contacto")}>contacto</button>
                </nav>
              </header>

              <main className="content">
                <section className="terminal fadeIn" key={active}>
                  <div className="status">
                    <span className="pulse"></span>
                    <span>{section.title}</span>
                  </div>

                  <h1>&gt; {active}</h1>
                  <p className="sub">{section.subtitle}</p>

                  <div className="gridCards">
                    {section.cards.map((card, idx) => (
                      <article className={"card" + (section.cards.length === 1 && idx === 0 ? " wide" : "")} key={idx}>
                        <h2>{card.title}</h2>
                        <p>{card.text}</p>
                        {card.link ? (
                          <div className="tags">
                            <span className="tag">
                              <a href={card.link} target="_blank" rel="noreferrer">{card.text}</a>
                            </span>
                          </div>
                        ) : null}
                      </article>
                    ))}

                    <article className="card wide">
                      <h2>Estado de habilidades</h2>
                      <div className="tags">
                        {section.tags.map((tag, idx) => (
                          <span className="tag" key={idx}>{tag}</span>
                        ))}
                      </div>
                    </article>

                    {active === "contacto" && (
                      <article className="card wide">
                        <h2>Acceso directo</h2>
                        <div className="contact">
                          <div className="linkbox">
                            <p style={{ marginBottom: 8 }}>Correo</p>
                            <a href="mailto:jose.restrepowork@gmail.com">jose.restrepowork@gmail.com</a>
                          </div>
                          <div className="linkbox">
                            <p style={{ marginBottom: 8 }}>Repositorio</p>
                            <a href="https://github.com/Dertrox" target="_blank" rel="noreferrer">github.com/Dertrox</a>
                          </div>
                        </div>
                      </article>
                    )}
                  </div>
                </section>
              </main>

              <div className="footer">
                Portafolio técnico — hardware, software e ինտերacción.
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
